# Karma Infinity Dependabot template
# Copy this file into a repository as .github/dependabot.yml when that repository has matching dependency manifests.
# Do not enable package ecosystems that do not exist in the repository.

version: 2
updates:
  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"

  # JavaScript / TypeScript dependencies
  # Enable only when package.json exists.
